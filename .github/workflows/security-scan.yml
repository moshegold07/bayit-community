name: Security Scan
on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'
jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  npm-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install with retries
        run: |
          for i in 1 2 3; do
            npm ci --no-audit --no-fund --fetch-retries=5 --fetch-retry-mintimeout=20000 && exit 0
            echo "::warning::npm ci attempt $i failed, retrying in 10s"
            sleep 10
          done
          echo "::warning::npm ci failed 3x — network issue, skipping audit"
          exit 0
      - run: npm audit --audit-level=high
        continue-on-error: true
